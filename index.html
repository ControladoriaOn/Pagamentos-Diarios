<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pagamentos · Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
  /* ============================================================
     DESIGN TOKENS — todos com fallback (hub prevalece quando define)
     ============================================================ */
  :root {
    --bg:              #0A0618;
    --surface-1:       rgba(255,255,255,0.03);
    --surface-2:       #1F1732;
    --surface-3:       #2A1F3D;
    --border-color:    rgba(255,255,255,0.08);
    --border-hover:    rgba(255,255,255,0.14);
    --text-1:          #F5F0FA;
    --text-2:          #9B8EA8;
    --text-3:          #6B5E78;
    --orange-main:     #FF6E00;
    --orange-soft:     rgba(255,110,0,0.12);
    --orange-deep:     #D25500;
    --plum:            #3C003C;
    --status-ok:       #10B981;
    --status-warn:     #F59E0B;
    --status-err:      #EF4444;
    --font-display:    'Manrope', system-ui, sans-serif;
    --font-body:       'Manrope', system-ui, sans-serif;
    --font-mono:       'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text-1);
    font-size: 14.5px;
    line-height: 1.55;
    min-height: 100vh;
    display: flex;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(ellipse 800px 500px at 80% -10%, rgba(255,110,0,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 800px 600px at -10% 100%, rgba(60,0,60,0.35) 0%, transparent 60%);
    background-attachment: fixed;
  }
  /* Seções com âncora ganham margem de scroll pra não ficarem cobertas pelo header sticky */
  section[id] { scroll-margin-top: 100px; }

  /* ============================================================
     SIDEBAR
     ============================================================ */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: rgba(15,10,24,0.7);
    backdrop-filter: blur(14px);
    border-right: 1px solid var(--border-color);
    padding: 24px 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: sticky;
    top: 0;
    height: 100vh;
    z-index: 40;
  }
  .sidebar .logo {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 19px;
    letter-spacing: -0.02em;
    padding: 4px 10px 22px;
    border-bottom: 1px solid var(--border-color);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sidebar .logo-mark {
    width: 32px; height: 32px; border-radius: 9px;
    background: linear-gradient(135deg, var(--orange-main), var(--orange-deep));
    display: grid; place-items: center;
    color: white; font-size: 14px;
    box-shadow: 0 6px 16px -6px rgba(255,110,0,0.5);
  }
  .sidebar nav { display: flex; flex-direction: column; gap: 4px; }
  .sidebar nav a {
    text-decoration: none;
    color: var(--text-2);
    font-size: 13.5px;
    font-weight: 500;
    padding: 10px 12px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    gap: 11px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    border: 1px solid transparent;
  }
  .sidebar nav a:hover {
    color: var(--text-1);
    background: var(--surface-1);
  }
  .sidebar nav a.active {
    color: var(--text-1);
    background: var(--orange-soft);
    border-color: rgba(255,110,0,0.22);
  }
  .sidebar nav a i {
    width: 16px;
    font-size: 13px;
    color: var(--text-3);
    transition: color 0.15s;
  }
  .sidebar nav a:hover i,
  .sidebar nav a.active i { color: var(--orange-main); }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .sidebar-stamp {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    font-size: 11.5px;
    color: var(--text-2);
    line-height: 1.35;
  }
  .sidebar-stamp .dot {
    width: 8px; height: 8px;
    background: var(--status-ok);
    border-radius: 50%;
    flex-shrink: 0;
    animation: pulse-dot 2.5s infinite;
  }
  .sidebar-stamp.stale .dot { background: var(--status-warn); animation: pulse-dot-warn 2.5s infinite; }
  .sidebar-stamp.error .dot { background: var(--status-err); animation: pulse-dot-err 2.5s infinite; }
  .sidebar-stamp .stamp-label {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-3);
    display: block;
    margin-bottom: 2px;
  }
  .sidebar-stamp .stamp-text { color: var(--text-1); font-weight: 500; font-size: 12px; }

  @keyframes pulse-dot {
    0%   { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.55); }
    70%  { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
    100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
  }
  @keyframes pulse-dot-warn {
    0%{box-shadow:0 0 0 0 rgba(245,158,11,0.55)}70%{box-shadow:0 0 0 6px rgba(245,158,11,0)}100%{box-shadow:0 0 0 0 rgba(245,158,11,0)}
  }
  @keyframes pulse-dot-err {
    0%{box-shadow:0 0 0 0 rgba(239,68,68,0.55)}70%{box-shadow:0 0 0 6px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}
  }

  .btn-hub {
    padding: 11px 14px;
    background: var(--orange-soft);
    border: 1px solid rgba(255,110,0,0.28);
    color: var(--orange-main);
    font-family: inherit;
    font-weight: 600;
    font-size: 13px;
    border-radius: 10px;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.15s;
  }
  .btn-hub:hover {
    background: var(--orange-main);
    color: white;
    border-color: var(--orange-main);
    transform: translateY(-1px);
    box-shadow: 0 10px 24px -10px rgba(255,110,0,0.55);
  }

  /* ============================================================
     MAIN CONTENT & HEADER  (espelho fiel do hub)
     ============================================================ */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  header {
    height: 80px;
    background: rgba(15, 10, 24, 0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    position: sticky;
    top: 0;
    z-index: 50;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .page-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .page-title i { color: var(--orange-main); }

  /* ============================================================
     CONTENT
     ============================================================ */
  .content-body { padding: 32px 40px 64px; max-width: 1600px; width: 100%; }
  section[id] { margin-bottom: 48px; }
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .section-head-left { display: flex; flex-direction: column; gap: 4px; }
  .section-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.015em;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title i { color: var(--orange-main); font-size: 17px; }
  .section-sub { color: var(--text-2); font-size: 13px; margin: 0; }

  /* Data em badge destacado */
  .date-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 14px;
    background: linear-gradient(135deg, rgba(255,110,0,0.18) 0%, rgba(255,110,0,0.08) 100%);
    border: 1px solid rgba(255,110,0,0.35);
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--orange-main);
    white-space: nowrap;
    box-shadow: 0 4px 14px -6px rgba(255,110,0,0.25);
  }
  .date-badge i { font-size: 11.5px; }

  /* ============================================================
     ALERTS
     ============================================================ */
  .alerts {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px;
    margin-bottom: 22px;
  }
  .alert {
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 13.5px;
    display: flex;
    gap: 12px;
    align-items: center;
    background: var(--surface-1);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border-color);
  }
  .alert-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: grid; place-items: center;
    font-size: 13px;
    flex: 0 0 32px;
    color: white;
  }
  .alert.warn { border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.06); }
  .alert.warn .alert-icon { background: var(--status-warn); }
  .alert.info { border-color: rgba(255,110,0,0.28); background: rgba(255,110,0,0.06); }
  .alert.info .alert-icon { background: var(--orange-main); }
  .alert.ok   { border-color: rgba(16,185,129,0.28); background: rgba(16,185,129,0.06); }
  .alert.ok .alert-icon { background: var(--status-ok); }
  .alert strong { color: var(--text-1); font-weight: 700; }
  .alert small { display: block; color: var(--text-2); margin-top: 3px; font-size: 11.5px; }

  /* ============================================================
     KPIs
     ============================================================ */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  .kpi {
    background: var(--surface-1);
    backdrop-filter: blur(8px);
    border-radius: 16px;
    padding: 22px 24px;
    border: 1px solid var(--border-color);
    position: relative;
    overflow: hidden;
    transition: all 0.25s;
  }
  .kpi::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(255,110,0,0.04) 100%);
    pointer-events: none;
  }
  .kpi:hover {
    transform: translateY(-2px);
    border-color: var(--border-hover);
    box-shadow: 0 18px 40px -20px rgba(0,0,0,0.5);
  }
  .kpi.accent {
    background: linear-gradient(135deg, #3C003C 0%, #1F0028 100%);
    border-color: rgba(255,110,0,0.28);
  }
  .kpi.accent::before {
    background: radial-gradient(circle at 100% 0%, rgba(255,110,0,0.25) 0%, transparent 55%);
  }
  .kpi-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-2);
    margin: 0 0 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    position: relative;
  }
  .kpi-label i { font-size: 11px; color: var(--text-3); }
  .kpi.accent .kpi-label { color: rgba(245,240,250,0.7); }
  .kpi.accent .kpi-label i { color: var(--orange-main); }
  .kpi-value {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.025em;
    line-height: 1;
    display: flex;
    align-items: baseline;
    gap: 4px;
    position: relative;
    color: var(--text-1);
  }
  .kpi-value .prefix {
    font-size: 13px;
    color: var(--text-3);
    font-weight: 500;
  }
  .kpi.accent .kpi-value { color: var(--orange-main); }
  .kpi.accent .kpi-value .prefix { color: rgba(245,240,250,0.55); }
  .kpi-sub {
    margin: 12px 0 0;
    font-size: 12px;
    color: var(--text-2);
    display: flex;
    align-items: center;
    gap: 6px;
    position: relative;
  }
  .kpi-chip {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    background: var(--orange-soft);
    color: var(--orange-main);
    border: 1px solid rgba(255,110,0,0.25);
    border-radius: 999px;
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 10.5px;
  }

  /* ============================================================
     CARDS & TABLES
     ============================================================ */
  .card {
    background: var(--surface-1);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border-color);
    border-radius: 18px;
    overflow: hidden;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border-color);
    padding: 0 24px;
    flex-wrap: wrap;
  }
  .tab {
    padding: 14px 16px;
    background: none;
    border: 0;
    border-bottom: 2px solid transparent;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: -1px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .tab:hover { color: var(--text-1); }
  .tab.active { color: var(--text-1); border-bottom-color: var(--orange-main); }
  .tab-count {
    font-family: var(--font-mono);
    font-weight: 500;
    font-size: 10.5px;
    padding: 2px 7px;
    background: var(--surface-2);
    border-radius: 999px;
    color: var(--text-3);
  }
  .tab.active .tab-count { background: var(--orange-soft); color: var(--orange-main); }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 10px;
    padding: 14px 24px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border-color);
  }
  .search {
    position: relative;
    flex: 0 1 280px;
    min-width: 180px;
  }
  .search input {
    width: 100%;
    padding: 9px 12px 9px 34px;
    border: 1px solid var(--border-color);
    border-radius: 9px;
    font-family: inherit;
    font-size: 13px;
    background: var(--surface-2);
    color: var(--text-1);
    transition: all 0.15s;
  }
  .search input::placeholder { color: var(--text-3); }
  .search input:focus {
    outline: 0;
    border-color: var(--orange-main);
    background: var(--surface-3);
    box-shadow: 0 0 0 3px rgba(255,110,0,0.12);
  }
  .search i {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-3);
    font-size: 12px;
    pointer-events: none;
  }
  .filter-chip {
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid var(--border-color);
    background: var(--surface-2);
    color: var(--text-2);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.12s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .filter-chip:hover { border-color: var(--border-hover); color: var(--text-1); }
  .filter-chip.active {
    background: var(--orange-main);
    color: white;
    border-color: var(--orange-main);
  }
  /* Correção de contraste: quando chip ativo, pill interna fica branca legível */
  .filter-chip.active .pill {
    background: rgba(255,255,255,0.22) !important;
    color: white !important;
    border-color: rgba(255,255,255,0.35) !important;
  }

  /* Toolbar right (contagem + total) — com destaque reforçado */
  .toolbar-right {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-2);
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 6px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border-color);
    border-radius: 9px;
  }
  .toolbar-right .lbl { color: var(--text-3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
  .toolbar-right strong { color: var(--orange-main); font-weight: 700; font-size: 13.5px; }
  .toolbar-right .divider { width: 1px; height: 14px; background: var(--border-color); }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.data thead th {
    text-align: left;
    padding: 11px 16px;
    font-weight: 600;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-3);
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border-color);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  table.data thead th.center { text-align: center; }
  table.data thead th:hover { color: var(--text-1); }
  table.data thead th.sorted { color: var(--orange-main); }
  table.data thead th.sorted::after { content: attr(data-dir); margin-left: 4px; }
  table.data tbody tr {
    border-bottom: 1px solid var(--border-color);
    transition: background 0.1s;
  }
  table.data tbody tr:hover { background: rgba(255,110,0,0.04); }
  table.data tbody tr.flag-approval { background: rgba(245,158,11,0.06); }
  table.data tbody tr.flag-approval:hover { background: rgba(245,158,11,0.12); }
  table.data td { padding: 12px 16px; vertical-align: top; color: var(--text-1); }
  table.data td.center { text-align: center; }
  table.data td.num {
    font-family: var(--font-mono);
    font-size: 12.5px;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    color: var(--text-2);
  }
  table.data td.num.strong { font-weight: 600; color: var(--text-1); }
  table.data .hist { color: var(--text-3); font-size: 11.5px; margin-top: 2px; }
  .empty-row {
    text-align: center;
    padding: 32px;
    color: var(--text-3);
    font-style: italic;
  }

  /* Pills */
  .pill {
    display: inline-flex;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 10.5px;
    font-weight: 600;
    background: var(--surface-2);
    color: var(--text-2);
    white-space: nowrap;
    border: 1px solid var(--border-color);
    letter-spacing: 0.02em;
  }
  .pill.ok   { background: rgba(16,185,129,0.14); color: var(--status-ok);   border-color: rgba(16,185,129,0.28); }
  .pill.warn { background: rgba(245,158,11,0.14); color: var(--status-warn); border-color: rgba(245,158,11,0.28); }
  .pill.nf   { background: rgba(255,110,0,0.14);  color: var(--orange-main); border-color: rgba(255,110,0,0.28); }
  .pill.bol  { background: rgba(139,92,246,0.14); color: #A78BFA;            border-color: rgba(139,92,246,0.28); }
  .pill.rd   { background: rgba(16,185,129,0.14); color: var(--status-ok);   border-color: rgba(16,185,129,0.28); }

  tfoot.data td {
    padding: 14px 16px;
    background: rgba(255,255,255,0.02);
    font-weight: 600;
    border-top: 2px solid var(--border-color);
    font-size: 13px;
    color: var(--text-2);
  }
  tfoot.data .num {
    font-family: var(--font-mono);
    color: var(--orange-main);
    font-weight: 700;
  }
  tfoot.data .center { text-align: center; }

  /* Categoria summary em Previsto */
  .cat-summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border-color);
  }
  .cat-item {
    padding: 14px 16px;
    border: 1px solid var(--border-color);
    border-radius: 11px;
    background: var(--surface-2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .cat-item:hover { border-color: var(--border-hover); }
  .cat-item.active {
    border-color: var(--orange-main);
    background: var(--orange-soft);
    box-shadow: 0 4px 14px -6px rgba(255,110,0,0.3);
  }
  .cat-item .cat-label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-2);
    font-weight: 600;
    margin: 0 0 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cat-item .cat-label i { color: var(--text-3); font-size: 10.5px; }
  .cat-item.active .cat-label i { color: var(--orange-main); }
  .cat-item .cat-value {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.015em;
    color: var(--text-1);
  }
  .cat-item .cat-sub {
    margin: 6px 0 0;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-3);
  }

  /* States */
  .empty-state {
    padding: 80px 32px;
    text-align: center;
    background: var(--surface-1);

  .empty-state h2 {
    font-family: var(--font-display);

  }
  .empty-state p { color: var(--text-2); margin: 0 0 20px; max-width: 520px; margin-inline: auto; }
  .empty-state code {
    font-family: var(--font-mono);
    background: var(--surface-2);
    padding: 2px 6px;
    border-radius: 4px;

  .btn-retry {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 22px;
    background: var(--orange-main);
    color: white;
    border: 0;
    border-radius: 10px;
    font-family: inherit;
    font-weight: 600;

  }
  .btn-retry:hover { background: var(--orange-deep); transform: translateY(-1px); box-shadow: 0 10px 24px -10px rgba(255,110,0,0.55); }

  .reveal { animation: reveal 0.5s ease-out both; }
  .reveal:nth-child(2) { animation-delay: 0.06s; }
  .reveal:nth-child(3) { animation-delay: 0.12s; }
  @keyframes reveal {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 1100px) {
    .sidebar { display: none; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .cat-summary { grid-template-columns: 1fr; }
  }
  @media (max-width: 640px) {
    header { padding: 0 20px; }
    .content-body { padding: 20px; }
    .kpi-grid { grid-template-columns: 1fr; }
    .kpi-value { font-size: 23px; }
    .toolbar-right { width: 100%; margin-left: 0; justify-content: space-between; }
    .search { flex: 1 1 100%; }
  }
</style>
</head>
<body>

<!-- ============================================================
     SIDEBAR — 3 âncoras + rodapé com stamp e link pro hub
     ============================================================ -->
<aside class="sidebar" aria-label="Navegação principal">
  <div class="logo">
    <div class="logo-mark"><i class="fa-solid fa-wallet"></i></div>
    <span>Financeiro</span>
  </div>
  <nav>
    <a href="#dashboard" class="active" data-spy-link>
      <i class="fa-solid fa-gauge-high"></i> Dashboard
    </a>
    <a href="#realizados" data-spy-link>
      <i class="fa-solid fa-check-double"></i> Pagamentos Realizados
    </a>
    <a href="#previsto" data-spy-link>
      <i class="fa-solid fa-calendar-day"></i> Prévia de Pagamentos
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-stamp" id="stamp" role="status" aria-live="polite">
      <span class="dot"></span>
      <div>
        <span class="stamp-label">Status</span>
        <span class="stamp-text" id="stamp-text">carregando…</span>
      </div>
    </div>
    <!-- TODO: Ajuste o href de "Voltar ao Hub" para a URL real do seu hub. -->
    <a class="btn-hub" href="/" rel="noopener">
      <i class="fa-solid fa-arrow-left-long"></i>
      Voltar ao Hub
    </a>
  </div>
</aside>

<div class="main-content">
  <header>
    <div class="header-left">
      <h1 class="page-title">
        <i class="fa-solid fa-chart-line"></i>
        Pagamentos
      </h1>
    </div>
  </header>

  <div class="content-body" id="main-container">
    <div class="empty-state" id="initial-state">
      <h2>Carregando dados…</h2>
      <p>Aguarde enquanto buscamos as informações mais recentes.</p>
    </div>
  </div>
</div>

<script>
'use strict';

/* ============================================================================
   CONFIG
   ============================================================================ */
const CONFIG = Object.freeze({
  DATA_URL: 'data.json',
  FETCH_RETRIES: 3,
  FETCH_BACKOFF_MS: 600,
  SECTIONS: ['dashboard', 'realizados', 'previsto'],
  STALE_HOURS: 30,
  LOCALE: 'pt-BR',
});

/* ============================================================================
   UTILS — formatação e helpers puros
   ============================================================================ */
const Utils = {
  fmtBR(n) {
    return (n || 0).toLocaleString(CONFIG.LOCALE, {
      minimumFractionDigits: 2, maximumFractionDigits: 2
    });
  },
  fmtBRInt(n) {
    return (n || 0).toLocaleString(CONFIG.LOCALE, { maximumFractionDigits: 0 });
  },
  fmtBRShort(n) {
    if (!n) return '0';
    if (Math.abs(n) >= 1e6) return (n/1e6).toLocaleString(CONFIG.LOCALE, {maximumFractionDigits:2}) + ' mi';
    if (Math.abs(n) >= 1e3) return (n/1e3).toLocaleString(CONFIG.LOCALE, {maximumFractionDigits:1}) + ' mil';
    return n.toLocaleString(CONFIG.LOCALE, {maximumFractionDigits:0});
  },
  fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso + (iso.length === 10 ? 'T00:00:00' : ''));
    if (isNaN(d)) return '—';
    return d.toLocaleDateString(CONFIG.LOCALE, { day: '2-digit', month: 'long', year: 'numeric' });
  },
  fmtDateTime(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    if (isNaN(d)) return '—';
    return d.toLocaleDateString(CONFIG.LOCALE, { day:'2-digit', month:'2-digit' }) + ' às ' +
           d.toLocaleTimeString(CONFIG.LOCALE, { hour:'2-digit', minute:'2-digit' });
  },
  truncate(s, n) {
    if (!s) return '';
    return s.length > n ? s.slice(0, n-1) + '…' : s;
  },
  pillClass(tipo) {
    return ({ NF: 'nf', BOL: 'bol', RD: 'rd' })[tipo] || '';
  },
  compareRows(a, b, col, dir) {
    const va = a[col], vb = b[col];
    if (typeof va === 'number' || typeof vb === 'number') {
      return ((va || 0) - (vb || 0)) * dir;
    }
    return String(va || '').localeCompare(String(vb || ''), CONFIG.LOCALE) * dir;
  },
  isApprovalStatus(status) {
    return /aprova[cç][aã]o/i.test(status || '');
  },
  delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  },
};

/* ============================================================================
   DOM — builder XSS-safe via createElement / textContent
   ============================================================================ */
const DOM = {
  /**
   * Cria um elemento DOM com atributos e filhos. Todos os valores de texto
   * passam por textContent — imunes a XSS. Nunca injeta HTML.
   */
  h(tag, props, children) {
    const el = document.createElement(tag);
    if (props && typeof props === 'object') {
      for (const [key, val] of Object.entries(props)) {
        if (val == null || val === false) continue;
        if (key === 'class' || key === 'className') {
          el.className = val;
        } else if (key === 'text') {
          el.textContent = val;
        } else if (key === 'dataset') {
          Object.assign(el.dataset, val);
        } else if (key === 'style' && typeof val === 'object') {
          Object.assign(el.style, val);
        } else if (key.startsWith('on') && typeof val === 'function') {
          el.addEventListener(key.slice(2).toLowerCase(), val);
        } else if (key === 'title' || key === 'aria-label' || key === 'role' || key === 'href' || key === 'id' || key === 'placeholder' || key === 'type' || key === 'tabindex') {
          el.setAttribute(key, val);
        } else {
          el.setAttribute(key, val);
        }
      }
    }
    this._append(el, children);
    return el;
  },

  _append(parent, child) {
    if (child == null || child === false) return;
    if (Array.isArray(child)) {
      for (const c of child) this._append(parent, c);
      return;
    }
    if (child instanceof Node) {
      parent.appendChild(child);
      return;
    }
    parent.appendChild(document.createTextNode(String(child)));
  },

  icon(cls) {
    return this.h('i', { class: 'fa-solid ' + cls, 'aria-hidden': 'true' });
  },

  pill(text, extraCls) {
    const cls = 'pill' + (extraCls ? ' ' + extraCls : '');
    return this.h('span', { class: cls }, text || '—');
  },

  clear(node) {
    if (!node) return;
    while (node.firstChild) node.removeChild(node.firstChild);
  },

  byId(id) {
    return document.getElementById(id);
  },
};

/* ============================================================================
   DATA SERVICE — fetch com retry e backoff exponencial
   ============================================================================ */
const DataService = {
  async fetchWithRetry(url, { retries = CONFIG.FETCH_RETRIES, backoff = CONFIG.FETCH_BACKOFF_MS } = {}) {
    let lastError;
    for (let attempt = 0; attempt <= retries; attempt++) {
      try {
        const response = await fetch(url, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status} ${response.statusText}`);
        }
        return response;
      } catch (err) {
        lastError = err;
        if (attempt < retries) {
          const waitMs = backoff * Math.pow(2, attempt);
          console.warn(`[DataService] Tentativa ${attempt+1} falhou: ${err.message}. Aguardando ${waitMs}ms…`);
          await Utils.delay(waitMs);
        }
      }
    }
    throw lastError;
  },

  async loadData() {
    const url = CONFIG.DATA_URL + '?v=' + Date.now();
    const response = await this.fetchWithRetry(url);
    const json = await response.json();
    this._validate(json);
    return json;
  },

  _validate(data) {
    if (!data || typeof data !== 'object') {
      throw new Error('Resposta não é um objeto JSON válido');
    }
    if (!data.meta || !data.pago_hoje || !data.previsto_amanha) {
      throw new Error('Estrutura do data.json está incompleta');
    }
  },
};

/* ============================================================================
   UI_SIDEBAR — stamp de atualização no rodapé
   ============================================================================ */
const UI_Sidebar = {
  updateStamp(data) {
    const stamp = DOM.byId('stamp');
    const text = DOM.byId('stamp-text');
    if (!stamp || !text) return;

    if (!data || !data.meta || !data.meta.generated_at) {
      stamp.className = 'sidebar-stamp error';
      text.textContent = 'sem dados';
      return;
    }

    const generated = new Date(data.meta.generated_at);
    const hoursAgo = (Date.now() - generated.getTime()) / 36e5;

    if (hoursAgo > CONFIG.STALE_HOURS) {
      stamp.className = 'sidebar-stamp stale';
      const days = Math.floor(hoursAgo / 24);
      text.textContent = `dados de ${days}d atrás`;
    } else {
      stamp.className = 'sidebar-stamp';
      text.textContent = `atualizado em ${Utils.fmtDateTime(data.meta.generated_at)}`;
    }
  },

  setError() {
    const stamp = DOM.byId('stamp');
    const text = DOM.byId('stamp-text');
    if (stamp) stamp.className = 'sidebar-stamp error';
    if (text) text.textContent = 'falha ao carregar';
  },
};

/* ============================================================================
   UI_DASHBOARD — KPIs e Alertas (seção #dashboard)
   ============================================================================ */
const UI_Dashboard = {
  render(data) {
    const section = DOM.h('section', { id: 'dashboard', class: 'reveal' }, [
      this._renderSectionHead(data.meta),
      this._renderAlerts(data),
      this._renderKPIs(data),
    ]);
    return section;
  },

  _renderSectionHead(meta) {
    return DOM.h('div', { class: 'section-head' }, [
      DOM.h('div', { class: 'section-head-left' }, [
        DOM.h('h2', { class: 'section-title' }, [
          DOM.icon('fa-gauge-high'),
          'Dashboard',
        ]),
        DOM.h('p', { class: 'section-sub' }, 'Visão consolidada de hoje e amanhã'),
      ]),
      DOM.h('span', { class: 'date-badge' }, [
        DOM.icon('fa-calendar'),
        Utils.fmtDate(meta.data_hoje),
      ]),
    ]);
  },

  _renderAlerts(data) {
    const alerts = this._buildAlerts(data);
    if (!alerts.length) return null;
    return DOM.h('div', { class: 'alerts' }, alerts);
  },

  _buildAlerts(data) {
    const arr = [];
    const { previsto_amanha: prev, pago_hoje: hoje } = data;

    // Alerta 1: pendentes de aprovação — SEM subtexto (pedido do cliente)
    if (prev.em_aprovacao > 0) {
      arr.push(this._buildAlert(
        'warn',
        'fa-triangle-exclamation',
        [
          DOM.h('strong', {}, `${prev.em_aprovacao} títulos pendentes de aprovação`),
        ]
      ));
    }

    // Alerta 2: prévia maior que hoje — SEM subtexto (pedido do cliente)
    if (prev.total > hoje.total * 1.5 && hoje.total > 0) {
      const mult = (prev.total / hoje.total).toFixed(1);
      arr.push(this._buildAlert(
        'info',
        'fa-arrow-trend-up',
        [
          DOM.h('strong', {}, `Prévia de amanhã ${mult}× maior que hoje`),
        ]
      ));
    }

    // Alerta 3: fornecedores recorrentes — mantém o detalhe
    const forns = prev.nf_servico.concat(prev.nf_titulo, prev.reembolso)
      .map(x => (x.fornecedor || '').toUpperCase()).filter(Boolean);
    const hojeSet = new Set(hoje.titulos.map(t => (t.fornecedor || '').toUpperCase()).filter(Boolean));
    const recorrentes = [...new Set(forns.filter(f => hojeSet.has(f)))];
    if (recorrentes.length) {
      const plural = recorrentes.length > 1;
      const exemplos = recorrentes.slice(0, 2).map(s => Utils.truncate(s, 28)).join(', ');
      const more = recorrentes.length > 2 ? ' e mais' : '';
      arr.push(this._buildAlert(
        'ok',
        'fa-rotate',
        [
          DOM.h('strong', {}, `${recorrentes.length} fornecedor${plural?'es':''} recorrente${plural?'s':''}`),
          DOM.h('small', {}, `Apareceram hoje e voltam amanhã. Ex.: ${exemplos}${more}.`),
        ]
      ));
    }

    return arr;
  },

  _buildAlert(kind, iconCls, contentNodes) {
    return DOM.h('div', { class: 'alert ' + kind, role: 'alert' }, [
      DOM.h('div', { class: 'alert-icon' }, DOM.icon(iconCls)),
      DOM.h('div', {}, contentNodes),
    ]);
  },

  _renderKPIs(data) {
    const { pago_hoje: hoje, previsto_amanha: prev, meta } = data;
    const maiorForn = (hoje.maior && hoje.maior.fornecedor) ? hoje.maior.fornecedor : '—';

    return DOM.h('div', { class: 'kpi-grid' }, [
      this._buildKPI({
        accent: true,
        icon: 'fa-check-circle',
        label: 'Pago hoje',
        value: hoje.total,
        sub: `${hoje.quantidade} títulos · ${Utils.fmtDate(meta.data_hoje)}`,
      }),
      this._buildKPI({
        icon: 'fa-calendar-day',
        label: 'Previsto amanhã',
        value: prev.total,
        sub: `${prev.quantidade} títulos · ${Utils.fmtDate(meta.data_amanha)}`,
      }),
      this._buildKPI({
        icon: 'fa-trophy',
        label: 'Maior pagamento hoje',
        value: (hoje.maior && hoje.maior.valor) || 0,
        subNode: DOM.h('span', { title: maiorForn }, Utils.truncate(maiorForn, 30)),
      }),
      this._buildKPIPlain({
        icon: 'fa-triangle-exclamation',
        label: 'Pend. de aprovação',
        value: String(prev.em_aprovacao),
        subNode: DOM.h('span', {}, [
          DOM.h('span', { class: 'kpi-chip' }, 'risco'),
          ` dos ${prev.quantidade} previstos`,
        ]),
      }),
    ]);
  },

  _buildKPI({ accent, icon, label, value, sub, subNode }) {
    return DOM.h('div', { class: 'kpi' + (accent ? ' accent' : '') }, [
      DOM.h('p', { class: 'kpi-label' }, [DOM.icon(icon), label]),
      DOM.h('div', { class: 'kpi-value' }, [
        DOM.h('span', { class: 'prefix' }, 'R$'),
        Utils.fmtBRInt(value),
      ]),
      DOM.h('p', { class: 'kpi-sub' }, subNode || sub),
    ]);
  },

  _buildKPIPlain({ icon, label, value, subNode }) {
    return DOM.h('div', { class: 'kpi' }, [
      DOM.h('p', { class: 'kpi-label' }, [DOM.icon(icon), label]),
      DOM.h('div', { class: 'kpi-value' }, value),
      DOM.h('p', { class: 'kpi-sub' }, subNode),
    ]);
  },
};

/* ============================================================================
   UI_HOJE — seção Pagamentos Realizados (hoje)
   ============================================================================ */
const UI_Hoje = {
  _state: null,
  _data: null,
  _meta: null,
  _els: null,

  render(data) {
    this._data = data.pago_hoje;
    this._meta = data.meta;
    this._state = {
      filter: { q: '', tipo: null },
      sort:   { col: 'valor_rs', dir: -1 },
    };

    const section = DOM.h('section', { id: 'realizados', class: 'reveal' }, [
      this._renderSectionHead(),
      this._renderCard(),
    ]);

    // Estado inicial
    this._refresh();

    return section;
  },

  _renderSectionHead() {
    return DOM.h('div', { class: 'section-head' }, [
      DOM.h('div', { class: 'section-head-left' }, [
        DOM.h('h2', { class: 'section-title' }, [
          DOM.icon('fa-check-double'),
          'Pagamentos Realizados',
        ]),
        DOM.h('p', { class: 'section-sub' },
          `${this._data.quantidade} títulos liquidados · Total R$ ${Utils.fmtBR(this._data.total)}`
        ),
      ]),
      DOM.h('span', { class: 'date-badge' }, [
        DOM.icon('fa-calendar-check'),
        Utils.fmtDate(this._meta.data_hoje),
      ]),
    ]);
  },

  _columns() {
    return [
      { key: 'tipo', label: 'Tipo',
        renderCell: t => DOM.pill(t.tipo || '?', Utils.pillClass(t.tipo)),
      },
      { key: 'numero', label: 'Título',
        renderCell: t => String(t.numero || '—'),
      },
      { key: 'fornecedor', label: 'Fornecedor',
        renderCell: t => DOM.h('div', {}, [
          t.fornecedor || '—',
          t.historico ? DOM.h('div', { class: 'hist' }, t.historico) : null,
        ]),
      },
      { key: 'valor_rs', label: 'Valor',
        num: true, strong: true, center: true,
        renderCell: t => `R$ ${Utils.fmtBR(t.valor_rs)}`,
      },
    ];
  },

  _renderCard() {
    const cols = this._columns();
    const tipos = [...new Set(this._data.titulos.map(t => t.tipo).filter(Boolean))].sort();

    // Toolbar
    const searchInput = DOM.h('input', {
      id: 'hoje-search',
      placeholder: 'Buscar fornecedor, histórico, título...',
      type: 'text',
      'aria-label': 'Buscar pagamentos realizados',
    });
    searchInput.addEventListener('input', e => {
      this._state.filter.q = e.target.value;
      this._refresh();
    });

    const searchBox = DOM.h('div', { class: 'search' }, [
      DOM.icon('fa-magnifying-glass'),
      searchInput,
    ]);

    const allChip = this._buildFilterChip('', 'Todos', null, true);
    const tipoChips = tipos.map(t => this._buildFilterChip(t, t, Utils.pillClass(t), false));
    const chips = [allChip, ...tipoChips];

    const countEl = DOM.h('strong', { id: 'hoje-count' }, '0');
    const totalEl = DOM.h('strong', { id: 'hoje-total' }, 'R$ 0,00');

    const toolbarRight = DOM.h('div', { class: 'toolbar-right' }, [
      DOM.h('span', { class: 'lbl' }, 'Mostrando'),
      countEl,
      DOM.h('span', { class: 'divider' }),
      DOM.h('span', { class: 'lbl' }, 'Total'),
      totalEl,
    ]);

    const toolbar = DOM.h('div', { class: 'toolbar' }, [
      searchBox,
      ...chips,
      toolbarRight,
    ]);

    // Table
    const thead = DOM.h('thead', {}, DOM.h('tr', {},
      cols.map(c => {
        const th = DOM.h('th', {
          class: [c.num ? 'num' : '', c.center ? 'center' : ''].filter(Boolean).join(' '),
          dataset: { key: c.key },
        }, c.label);
        th.addEventListener('click', () => {
          if (this._state.sort.col === c.key) {
            this._state.sort.dir *= -1;
          } else {
            this._state.sort.col = c.key;
            this._state.sort.dir = 1;
          }
          this._refresh();
        });
        return th;
      })
    ));

    const tbody = DOM.h('tbody', { id: 'hoje-tbody' });
    const tfoot = DOM.h('tfoot', { class: 'data', id: 'hoje-tfoot' });

    const table = DOM.h('table', { class: 'data' }, [thead, tbody, tfoot]);
    const tableWrap = DOM.h('div', { class: 'table-wrap' }, table);

    this._els = { tbody, tfoot, countEl, totalEl, thead, chips, cols };

    return DOM.h('div', { class: 'card' }, [toolbar, tableWrap]);
  },

  _buildFilterChip(tipoValue, label, pillCls, isActive) {
    const chip = DOM.h('button', {
      class: 'filter-chip' + (isActive ? ' active' : ''),
      dataset: { tipo: tipoValue },
      type: 'button',
    }, pillCls ? DOM.pill(label, pillCls) : label);

    chip.addEventListener('click', () => {
      if (!this._els || !this._els.chips) return;
      this._els.chips.forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      this._state.filter.tipo = tipoValue || null;
      this._refresh();
    });

    return chip;
  },

  _filterAndSort() {
    const { q, tipo } = this._state.filter;
    const { col, dir } = this._state.sort;

    const rows = this._data.titulos.filter(t => {
      if (tipo && t.tipo !== tipo) return false;
      if (q) {
        const query = q.toLowerCase();
        const blob = [t.fornecedor, t.historico, t.numero, t.natureza]
          .map(v => (v || '').toString().toLowerCase())
          .join(' ');
        if (!blob.includes(query)) return false;
      }
      return true;
    });

    rows.sort((a, b) => Utils.compareRows(a, b, col, dir));
    return rows;
  },

  _refresh() {
    if (!this._els) return;
    const { tbody, tfoot, countEl, totalEl, thead, cols } = this._els;
    const { col, dir } = this._state.sort;

    const rows = this._filterAndSort();

    // TBODY
    DOM.clear(tbody);
    if (rows.length === 0) {
      tbody.appendChild(DOM.h('tr', {},
        DOM.h('td', { class: 'empty-row', colspan: cols.length }, 'Nenhum resultado')
      ));
    } else {
      for (const t of rows) {
        tbody.appendChild(this._renderRow(t, cols));
      }
    }

    // Totais
    const total = rows.reduce((s, t) => s + (t.valor_rs || 0), 0);
    countEl.textContent = String(rows.length);
    totalEl.textContent = 'R$ ' + Utils.fmtBR(total);

    // TFOOT
    DOM.clear(tfoot);
    const spanCount = cols.length - 1;
    tfoot.appendChild(DOM.h('tr', {}, [
      DOM.h('td', { colspan: spanCount }, `Total exibido (${rows.length} de ${this._data.titulos.length})`),
      DOM.h('td', { class: 'num center' }, 'R$ ' + Utils.fmtBR(total)),
    ]));

    // Sort indicators
    thead.querySelectorAll('th').forEach(th => {
      const isSorted = th.dataset.key === col;
      th.classList.toggle('sorted', isSorted);
      th.dataset.dir = isSorted ? (dir > 0 ? ' ↑' : ' ↓') : '';
    });
  },

  _renderRow(t, cols) {
    const tr = DOM.h('tr', {});
    for (const c of cols) {
      const classes = [];
      if (c.num) classes.push('num');
      if (c.strong) classes.push('strong');
      if (c.center) classes.push('center');
      const td = DOM.h('td', { class: classes.join(' ') || null });
      DOM._append(td, c.renderCell(t));
      tr.appendChild(td);
    }
    return tr;
  },
};

/* ============================================================================
   UI_PREVISTO — seção Prévia de Pagamentos (amanhã)
   ============================================================================ */
const UI_Previsto = {
  _state: null,
  _data: null,
  _meta: null,
  _els: null,
  _cats: null,

  render(data) {
    this._data = data.previsto_amanha;
    this._meta = data.meta;

    this._cats = [
      { key: 'nf_servico', label: 'NFs de Serviço', icon: 'fa-truck',        data: this._data.nf_servico },
      { key: 'nf_titulo',  label: 'NFs de Título',  icon: 'fa-file-invoice', data: this._data.nf_titulo },
      { key: 'reembolso',  label: 'Reembolsos',     icon: 'fa-receipt',      data: this._data.reembolso },
    ];

    const activeCat = this._cats.reduce((a, b) => a.data.length >= b.data.length ? a : b).key;

    this._state = {
      activeCat,
      filter: { q: '' },
      sort:   { col: 'valor_total', dir: -1 },
    };

    const section = DOM.h('section', { id: 'previsto', class: 'reveal' }, [
      this._renderSectionHead(),
      this._renderCard(),
    ]);

    this._refresh();

    return section;
  },

  _renderSectionHead() {
    return DOM.h('div', { class: 'section-head' }, [
      DOM.h('div', { class: 'section-head-left' }, [
        DOM.h('h2', { class: 'section-title' }, [
          DOM.icon('fa-calendar-day'),
          'Prévia de Pagamentos',
        ]),
        DOM.h('p', { class: 'section-sub' },
          `${this._data.quantidade} títulos previstos · Total R$ ${Utils.fmtBR(this._data.total)}`
        ),
      ]),
      DOM.h('span', { class: 'date-badge' }, [
        DOM.icon('fa-calendar'),
        Utils.fmtDate(this._meta.data_amanha),
      ]),
    ]);
  },

  _columnsFor(catKey) {
    const common = {
      aprovador:   { key: 'aprovador',   label: 'Aprovador',  renderCell: r => r.aprovador || '—' },
      status:      { key: 'status',      label: 'Status',     renderCell: r => this._renderStatus(r.status) },
      valor:       { key: 'valor_total', label: 'Valor',      num: true, strong: true, center: true,
                     renderCell: r => `R$ ${Utils.fmtBR(r.valor_total)}` },
    };

    if (catKey === 'nf_servico') {
      // EMPRESA removida conforme pedido do cliente
      return [
        { key: 'numero_nf',   label: 'NF',         renderCell: r => r.numero_nf || '—' },
        { key: 'fornecedor',  label: 'Fornecedor',
          renderCell: r => DOM.h('div', {}, [
            r.fornecedor || '—',
            r.observacoes ? DOM.h('div', { class: 'hist' }, Utils.truncate(r.observacoes, 64)) : null,
          ]),
        },
        common.aprovador,
        common.status,
        common.valor,
      ];
    }
    if (catKey === 'nf_titulo') {
      // EMPRESA removida conforme pedido do cliente
      return [
        { key: 'numero_titulo', label: 'Título', renderCell: r => r.numero_titulo || '—' },
        { key: 'fornecedor',    label: 'Fornecedor',
          renderCell: r => DOM.h('div', {}, [
            r.fornecedor || '—',
            r.historico ? DOM.h('div', { class: 'hist' }, r.historico) : null,
          ]),
        },
        common.aprovador,
        common.status,
        common.valor,
      ];
    }
    // reembolso
    return [
      { key: 'solicitante',     label: 'Solicitante',  renderCell: r => r.solicitante || '—' },
      { key: 'tipo_despesa',    label: 'Tipo despesa', renderCell: r => DOM.pill(r.tipo_despesa || '—') },
      { key: 'fornecedor',      label: 'Beneficiário', renderCell: r => r.fornecedor || '—' },
      { key: 'tipo_solicitacao',label: 'Solicitação',  renderCell: r => r.tipo_solicitacao || '—' },
      common.aprovador,
      common.valor,
    ];
  },

  _renderStatus(s) {
    if (!s) return DOM.pill('—');
    const low = s.toLowerCase();
    if (/aprova[cç][aã]o/.test(low)) return DOM.pill(s, 'warn');
    if (/aguardando|baixa/.test(low)) return DOM.pill(s, 'ok');
    return DOM.pill(s);
  },

  _renderCard() {
    // Cat summary
    const catItems = this._cats.map(c => {
      const isActive = c.key === this._state.activeCat;
      const item = DOM.h('div', {
        class: 'cat-item' + (isActive ? ' active' : ''),
        dataset: { cat: c.key },
        role: 'button',
        tabindex: '0',
      }, [
        DOM.h('p', { class: 'cat-label' }, [DOM.icon(c.icon), c.label]),
        DOM.h('div', { class: 'cat-value' }, 'R$ ' + Utils.fmtBR(this._data.por_categoria[c.key].total)),
        DOM.h('p', { class: 'cat-sub' }, `${this._data.por_categoria[c.key].quantidade} títulos`),
      ]);
      item.addEventListener('click', () => this._switchCat(c.key));
      item.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); this._switchCat(c.key); }
      });
      return item;
    });

    const catSummary = DOM.h('div', { class: 'cat-summary' }, catItems);

    // Tabs
    const tabs = this._cats.map(c => {
      const isActive = c.key === this._state.activeCat;
      const tab = DOM.h('button', {
        class: 'tab' + (isActive ? ' active' : ''),
        dataset: { cat: c.key },
        type: 'button',
      }, [
        DOM.icon(c.icon),
        c.label,
        DOM.h('span', { class: 'tab-count' }, String(c.data.length)),
      ]);
      tab.addEventListener('click', () => this._switchCat(c.key));
      return tab;
    });

    const tabsBar = DOM.h('div', { class: 'tabs', role: 'tablist' }, tabs);

    // Toolbar
    const searchInput = DOM.h('input', {
      id: 'prev-search',
      placeholder: 'Buscar fornecedor, solicitante, aprovador...',
      type: 'text',
      'aria-label': 'Buscar prévia de pagamentos',
    });
    searchInput.addEventListener('input', e => {
      this._state.filter.q = e.target.value;
      this._refresh();
    });

    const searchBox = DOM.h('div', { class: 'search' }, [
      DOM.icon('fa-magnifying-glass'),
      searchInput,
    ]);

    const countEl = DOM.h('strong', { id: 'prev-count' }, '0');
    const totalEl = DOM.h('strong', { id: 'prev-total' }, 'R$ 0,00');

    const toolbarRight = DOM.h('div', { class: 'toolbar-right' }, [
      DOM.h('span', { class: 'lbl' }, 'Mostrando'),
      countEl,
      DOM.h('span', { class: 'divider' }),
      DOM.h('span', { class: 'lbl' }, 'Total'),
      totalEl,
    ]);

    const toolbar = DOM.h('div', { class: 'toolbar' }, [searchBox, toolbarRight]);

    // Table shell
    const thead = DOM.h('thead');
    const tbody = DOM.h('tbody', { id: 'prev-tbody' });
    const tfoot = DOM.h('tfoot', { class: 'data', id: 'prev-tfoot' });
    const table = DOM.h('table', { class: 'data' }, [thead, tbody, tfoot]);
    const tableWrap = DOM.h('div', { class: 'table-wrap' }, table);

    this._els = { catItems, tabs, thead, tbody, tfoot, countEl, totalEl, searchInput };

    return DOM.h('div', { class: 'card' }, [
      catSummary,
      tabsBar,
      toolbar,
      tableWrap,
    ]);
  },

  _switchCat(catKey) {
    if (catKey === this._state.activeCat) return;
    this._state.activeCat = catKey;
    this._state.sort = { col: 'valor_total', dir: -1 };

    this._els.catItems.forEach(ci =>
      ci.classList.toggle('active', ci.dataset.cat === catKey)
    );
    this._els.tabs.forEach(t =>
      t.classList.toggle('active', t.dataset.cat === catKey)
    );
    this._refresh();
  },

  _filterAndSort(cols) {
    const { q } = this._state.filter;
    const { col, dir } = this._state.sort;
    const cat = this._cats.find(c => c.key === this._state.activeCat);

    const validCol = cols.find(c => c.key === col) ? col : cols[cols.length - 1].key;

    const rows = cat.data.filter(r => {
      if (!q) return true;
      // Busca em todos os campos textuais do registro
      return JSON.stringify(r).toLowerCase().includes(q.toLowerCase());
    });

    rows.sort((a, b) => Utils.compareRows(a, b, validCol, dir));
    return { rows, validCol };
  },

  _refresh() {
    if (!this._els) return;
    const { thead, tbody, tfoot, countEl, totalEl } = this._els;
    const { dir } = this._state.sort;

    const cat = this._cats.find(c => c.key === this._state.activeCat);
    const cols = this._columnsFor(this._state.activeCat);
    const { rows, validCol } = this._filterAndSort(cols);

    // THEAD
    DOM.clear(thead);
    const headerRow = DOM.h('tr', {});
    for (const c of cols) {
      const isSorted = c.key === validCol;
      const th = DOM.h('th', {
        class: [c.num ? 'num' : '', c.center ? 'center' : '', isSorted ? 'sorted' : ''].filter(Boolean).join(' '),
        dataset: { key: c.key, dir: isSorted ? (dir > 0 ? ' ↑' : ' ↓') : '' },
      }, c.label);
      th.addEventListener('click', () => {
        if (this._state.sort.col === c.key) {
          this._state.sort.dir *= -1;
        } else {
          this._state.sort.col = c.key;
          this._state.sort.dir = 1;
        }
        this._refresh();
      });
      headerRow.appendChild(th);
    }
    thead.appendChild(headerRow);

    // TBODY
    DOM.clear(tbody);
    if (rows.length === 0) {
      tbody.appendChild(DOM.h('tr', {},
        DOM.h('td', { class: 'empty-row', colspan: cols.length },
          `Nenhum título ${cat.label.toLowerCase()} previsto`)
      ));
    } else {
      for (const r of rows) {
        tbody.appendChild(this._renderRow(r, cols));
      }
    }

    // Totais
    const total = rows.reduce((s, r) => s + (r.valor_total || 0), 0);
    countEl.textContent = String(rows.length);
    totalEl.textContent = 'R$ ' + Utils.fmtBR(total);

    // TFOOT
    DOM.clear(tfoot);
    tfoot.appendChild(DOM.h('tr', {}, [
      DOM.h('td', { colspan: cols.length - 1 },
        `Total exibido (${rows.length} de ${cat.data.length})`),
      DOM.h('td', { class: 'num center' }, 'R$ ' + Utils.fmtBR(total)),
    ]));
  },

  _renderRow(r, cols) {
    const isRisk = Utils.isApprovalStatus(r.status);
    const tr = DOM.h('tr', { class: isRisk ? 'flag-approval' : null });
    for (const c of cols) {
      const classes = [];
      if (c.num) classes.push('num');
      if (c.strong) classes.push('strong');
      if (c.center) classes.push('center');
      const td = DOM.h('td', { class: classes.join(' ') || null });
      DOM._append(td, c.renderCell(r));
      tr.appendChild(td);
    }
    return tr;
  },
};

/* ============================================================================
   SCROLLSPY — ativa link da sidebar conforme scroll (scroll-position based)
   ============================================================================ */
const ScrollSpy = {
  _links: null,
  _sections: null,
  _ticking: false,
  _offset: 120, // ponto de ativação medido a partir do topo do viewport

  init() {
    this._links = Array.from(document.querySelectorAll('[data-spy-link]'));
    if (!this._links.length) return;

    this._sections = CONFIG.SECTIONS
      .map(id => ({ id, el: document.getElementById(id) }))
      .filter(s => s.el);

    if (!this._sections.length) return;

    // Smooth scroll ao clicar nos links
    this._links.forEach(link => {
      link.addEventListener('click', e => {
        const targetId = link.getAttribute('href').slice(1);
        const target = document.getElementById(targetId);
        if (!target) return;
        e.preventDefault();
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        this._setActive(targetId);
      });
    });

    // Listener de scroll com rAF throttle (economiza CPU)
    window.addEventListener('scroll', () => this._onScroll(), { passive: true });
    window.addEventListener('resize', () => this._onScroll(), { passive: true });
    this._onScroll();
  },

  _onScroll() {
    if (this._ticking) return;
    this._ticking = true;
    requestAnimationFrame(() => {
      this._update();
      this._ticking = false;
    });
  },

  _update() {
    const trigger = window.scrollY + this._offset;
    let activeId = this._sections[0].id;
    for (const { id, el } of this._sections) {
      if (el.offsetTop <= trigger) activeId = id;
    }
    this._setActive(activeId);
  },

  _setActive(id) {
    this._links.forEach(l => {
      const href = l.getAttribute('href') || '';
      l.classList.toggle('active', href === '#' + id);
    });
  },
};

/* ============================================================================
   APP — orquestrador
   ============================================================================ */
const App = {
  async init() {
    try {
      const data = await DataService.loadData();
      UI_Sidebar.updateStamp(data);
      this._renderAll(data);
      ScrollSpy.init();
    } catch (err) {
      console.error('[App] Falha ao carregar dashboard:', err);
      UI_Sidebar.setError();
      this._renderError(err);
    }
  },

  _renderAll(data) {
    const container = DOM.byId('main-container');
    DOM.clear(container);

    container.appendChild(UI_Dashboard.render(data));
    container.appendChild(UI_Hoje.render(data));
    container.appendChild(UI_Previsto.render(data));
  },

  _renderError(err) {
    const container = DOM.byId('main-container');
    DOM.clear(container);

    const retryBtn = DOM.h('button', {
      class: 'btn-retry',
      type: 'button',
    }, [DOM.icon('fa-rotate-right'), 'Tentar novamente']);

    retryBtn.addEventListener('click', () => {
      DOM.clear(container);
      container.appendChild(DOM.h('div', { class: 'empty-state' }, [
        DOM.h('h2', {}, 'Recarregando…'),
        DOM.h('p', {}, 'Tentando buscar os dados novamente.'),
      ]));
      App.init();
    });

    const message = err && err.message ? err.message : 'Erro desconhecido';

    container.appendChild(DOM.h('div', { class: 'empty-state' }, [
      DOM.h('h2', {}, 'Não foi possível carregar o dashboard'),
      DOM.h('p', {}, [
        'Tentamos buscar ',
        DOM.h('code', {}, 'data.json'),
        ' algumas vezes e não conseguimos. Verifique se o arquivo está na mesma pasta deste index.html. ',
      ]),
      DOM.h('p', { style: { color: 'var(--text-3)', fontSize: '12px', marginBottom: '20px' } },
        `Detalhe técnico: ${message}`
      ),
      retryBtn,
    ]));
  },
};

/* ============================================================================
   BOOTSTRAP
   ============================================================================ */
document.addEventListener('DOMContentLoaded', () => App.init());
</script>
